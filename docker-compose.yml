version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=4000
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/.data:/app/.data
    depends_on:
      - redis
    command: sh -c "npm rebuild && npm run dev"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
